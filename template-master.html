<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bookmyca | Template Master</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <!-- TinyMCE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
  <style>
    :root { --navy:#0F172A; --navy-h:#1E293B; --accent:#38BDF8; --bg:#F1F5F9; --border:#E2E8F0; }
    *, *::before, *::after { box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:#334155; }
    .navbar { background:var(--navy)!important; }
    .logo-box { width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--navy);font-size:1rem; }
    .btn-navy { background:var(--navy);color:#fff;border:none;transition:all .2s; }
    .btn-navy:hover { background:var(--navy-h);color:#fff;transform:translateY(-1px); }
    .btn-out-navy { border:1.5px solid var(--navy);color:var(--navy);background:transparent;font-size:.8rem;transition:all .2s; }
    .btn-out-navy:hover { background:var(--navy);color:#fff; }

    /* Table */
    table.dataTable { border-collapse:collapse!important; }
    table.dataTable thead th { font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#64748B;padding:13px 16px;border-bottom:2px solid var(--border)!important;background:#F8FAFC; }
    table.dataTable tbody td { padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:.85rem; }
    .table-hover tbody tr:hover { background:#F8FAFC!important;cursor:pointer; }
    .dataTables_filter input { border:1px solid var(--border);border-radius:8px;padding:6px 14px;background:#F8FAFC;margin-left:6px;outline:none; }
    .dataTables_paginate .paginate_button.current { background:var(--navy)!important;color:#fff!important;border-radius:6px;border:none!important; }

    /* Form */
    .form-control,.form-select { border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:.875rem;background:#fff;box-shadow:none!important; }
    .form-control:focus,.form-select:focus { border-color:#94A3B8; }
    .modal-content { border-radius:16px!important;overflow:hidden; }
    .type-badge { display:inline-block;background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;padding:2px 8px;border-radius:6px;font-size:.72rem;font-weight:600; text-transform:uppercase; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark py-2 shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <div class="logo-box"><i class="fa-solid fa-file-contract"></i></div>
      <span class="fw-bold fs-5">Bookmyca <span class="text-white-50 fw-light">Template Master</span></span>
    </a>
    <div class="d-flex gap-2">
      <a href="agreement-builder.html" class="btn btn-sm btn-outline-light"><i class="fa-solid fa-file-invoice me-1"></i>Agreement Builder</a>
      <a href="index.html" class="btn btn-sm btn-outline-light"><i class="fa-solid fa-shield-halved me-1"></i>Hub</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">

  <!-- Main Card -->
  <div class="card border-0 shadow-sm" style="border-radius:14px;overflow:hidden;">
    <div class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
      <h5 class="mb-0 fw-bold" style="color:var(--navy)"><i class="fa-solid fa-list-check me-2"></i>Templates & Checklists</h5>
      <button class="btn btn-navy px-4 fw-semibold" onclick="openModal()"><i class="fa-solid fa-plus me-2"></i>Add Template</button>
    </div>
    <div class="card-body p-4">
      <div id="loader" class="text-center py-5">
        <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
        <p class="mt-3 text-muted fw-medium">Loading templates…</p>
      </div>
      <div id="tblWrap" style="display:none;" class="table-responsive">
        <table id="tplTbl" class="table table-hover w-100">
          <thead>
            <tr>
              <th>Title</th>
              <th>Type</th>
              <th>Preview (Snippet)</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- Template Modal -->
<div class="modal fade" id="tplModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-bottom-0 pb-0">
        <h5 class="modal-title fw-bold" id="modalTitle">Add Template</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" onclick="closeModal()"></button>
      </div>
      <div class="modal-body py-4">
        <form id="tplForm" onsubmit="saveTemplate(event)">
          <input type="hidden" id="tplId">
          <div class="row g-3">
            
            <div class="col-md-9">
              <label class="form-label fw-semibold small text-muted">Document Title</label>
              <input type="text" class="form-control" id="tplTitle" placeholder="e.g. CHECK LIST FOR PL" required>
            </div>
            
            <div class="col-md-3">
              <label class="form-label fw-semibold small text-muted">Template Type</label>
              <select class="form-select" id="tplType" required>
                <option value="checklist">Checklist</option>
                <option value="form">Form</option>
                <option value="agreement">Agreement / Letter</option>
              </select>
            </div>

            <div class="col-12 mt-4">
              <label class="form-label fw-semibold small text-muted d-flex justify-content-between">
                <span>Document Content (Rendered as HTML)</span>
                <span class="text-primary"><i class="fa-solid fa-pen-to-square me-1"></i>Rich Text Editor active</span>
              </label>
              <textarea id="tplContent" style="width:100%;height:400px;"></textarea>
            </div>

          </div>
          <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal" onclick="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-navy px-4" id="saveBtn">Save Template</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
const API = '';
let token = '';
let templates = [];
let table;
let editorInitialised = false;

window.addEventListener('DOMContentLoaded', async () => {
    token = localStorage.getItem('sa_token');
    const user = JSON.parse(localStorage.getItem('sa_user')||'{}');
    if (!token || (user.role !== 'admin' && user.role !== 'superadmin')) {
        window.location.href = 'index.html';
        return;
    }
    await loadTemplates();
    initTinyMCE();
});

function initTinyMCE() {
    tinymce.init({
        selector: '#tplContent',
        plugins: 'lists link image table code help wordcount',
        toolbar: 'undo redo | blocks | bold italic underline | alignleft aligncenter alignright | bullist numlist outdent indent | table | code',
        height: 500,
        menubar: false,
        branding: false,
        setup: function (editor) {
            editor.on('init', function () { editorInitialised = true; });
        }
    });
}

async function loadTemplates() {
    try {
        const res = await fetch(`${API}/api/templates`, { headers: { Authorization: 'Bearer ' + token } });
        const data = await res.json();
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('tblWrap').style.display = 'block';
        
        if (data.success) {
            templates = data.templates;
            renderTable();
        } else {
            Swal.fire('Error', data.error || 'Failed to load templates', 'error');
        }
    } catch (e) {
        Swal.fire('Error', 'Connection failed', 'error');
    }
}

function renderTable() {
    if (table) { table.destroy(); }
    const tbody = document.getElementById('tblBody');
    tbody.innerHTML = '';
    
    templates.forEach(t => {
        const snippet = t.content ? t.content.replace(/<[^>]*>?/gm, '').substring(0, 80) + '...' : '<i>No content</i>';
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="fw-semibold text-dark">${t.title}</td>
            <td><span class="type-badge">${t.type}</span></td>
            <td class="text-muted small">${snippet}</td>
            <td>
                <button class="btn btn-sm btn-light text-primary me-2" onclick="editTemplate('${t._id}')"><i class="fa-solid fa-pen"></i></button>
                <button class="btn btn-sm btn-light text-danger" onclick="deleteTemplate('${t._id}')"><i class="fa-solid fa-trash"></i></button>
            </td>
        `;
        tbody.appendChild(tr);
    });

    table = $('#tplTbl').DataTable({
        pageLength: 25,
        language: { search: "", searchPlaceholder: "Search templates..." },
        ordering: false
    });
}

function openModal() {
    document.getElementById('tplId').value = '';
    document.getElementById('tplTitle').value = '';
    document.getElementById('tplType').value = 'checklist';
    if(editorInitialised) tinymce.get('tplContent').setContent('');
    document.getElementById('modalTitle').innerText = 'Add New Template';
    new bootstrap.Modal(document.getElementById('tplModal')).show();
}

function closeModal() {
    const m = bootstrap.Modal.getInstance(document.getElementById('tplModal'));
    if(m) m.hide();
}

function editTemplate(id) {
    const t = templates.find(x => x._id === id);
    if (!t) return;
    
    document.getElementById('tplId').value = t._id;
    document.getElementById('tplTitle').value = t.title;
    document.getElementById('tplType').value = t.type || 'checklist';
    if(editorInitialised) tinymce.get('tplContent').setContent(t.content || '');
    document.getElementById('modalTitle').innerText = 'Edit Template';
    
    new bootstrap.Modal(document.getElementById('tplModal')).show();
}

async function saveTemplate(e) {
    e.preventDefault();
    const id = document.getElementById('tplId').value;
    const loadData = {
        title: document.getElementById('tplTitle').value,
        type: document.getElementById('tplType').value,
        content: tinymce.get('tplContent').getContent()
    };
    
    const btn = document.getElementById('saveBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving...';
    btn.disabled = true;

    try {
        const url = id ? `${API}/api/templates/${id}` : `${API}/api/templates`;
        const method = id ? 'PUT' : 'POST';
        
        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify(loadData)
        });
        const data = await res.json();
        
        if (data.success) {
            Swal.fire({ title: 'Saved!', icon: 'success', timer: 1500, showConfirmButton: false });
            closeModal();
            await loadTemplates();
        } else {
            Swal.fire('Error', data.error || 'Failed to save', 'error');
        }
    } catch (err) {
        Swal.fire('Error', 'Connection failed', 'error');
    } finally {
        btn.innerHTML = 'Save Template';
        btn.disabled = false;
    }
}

function deleteTemplate(id) {
    Swal.fire({
        title: 'Delete Template?',
        text: "This action cannot be undone. Are you sure?",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#DC2626',
        confirmButtonText: 'Yes, delete it!'
    }).then(async (result) => {
        if (result.isConfirmed) {
            try {
                const res = await fetch(`${API}/api/templates/${id}`, {
                    method: 'DELETE',
                    headers: { Authorization: 'Bearer ' + token }
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire({ title: 'Deleted!', icon: 'success', timer: 1500, showConfirmButton: false });
                    await loadTemplates();
                } else {
                    Swal.fire('Error', data.error || 'Failed to delete', 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Connection failed', 'error');
            }
        }
    });
}
</script>
<script src="sidebar.js"></script>
</body>
</html>
