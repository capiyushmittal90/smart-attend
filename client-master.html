<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bookmyca | Client Master</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <style>
    :root { --navy:#0F172A; --navy-h:#1E293B; --accent:#38BDF8; --bg:#F1F5F9; --border:#E2E8F0; }
    *, *::before, *::after { box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:#334155; }
    .navbar { background:var(--navy)!important; }
    .logo-box { width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--navy);font-size:1rem; }
    .btn-navy { background:var(--navy);color:#fff;border:none;transition:all .2s; }
    .btn-navy:hover { background:var(--navy-h);color:#fff;transform:translateY(-1px); }
    .btn-out-navy { border:1.5px solid var(--navy);color:var(--navy);background:transparent;font-size:.8rem;transition:all .2s; }
    .btn-out-navy:hover { background:var(--navy);color:#fff; }

    /* Stats */
    .stat-bar { display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px; }
    .stat-item { background:#fff;border-radius:12px;padding:14px 20px;border:1px solid var(--border);flex:1;min-width:140px;text-align:center; }
    .stat-num { font-size:1.5rem;font-weight:700;display:block; }
    .stat-lbl { font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#64748B;font-weight:600; }

    /* Table */
    table.dataTable { border-collapse:collapse!important; }
    table.dataTable thead th { font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#64748B;padding:13px 16px;border-bottom:2px solid var(--border)!important;background:#F8FAFC; }
    table.dataTable tbody td { padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:.85rem; }
    .table-hover tbody tr:hover { background:#F8FAFC!important;cursor:pointer; }
    .dataTables_filter input { border:1px solid var(--border);border-radius:8px;padding:6px 14px;background:#F8FAFC;margin-left:6px;outline:none; }
    .dataTables_paginate .paginate_button.current { background:var(--navy)!important;color:#fff!important;border-radius:6px;border:none!important; }

    /* Form */
    .form-control,.form-select { border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:.875rem;background:#fff;box-shadow:none!important; }
    .form-control:focus,.form-select:focus { border-color:#94A3B8; }
    .modal-content { border-radius:16px!important;overflow:hidden; }

    /* Service tags */
    .svc-tag { display:inline-block;background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;padding:2px 8px;border-radius:6px;font-size:.72rem;font-weight:600;margin-right:4px;margin-bottom:2px; }

    /* Client detail panel */
    .detail-panel { background:#fff;border-radius:14px;border:1px solid var(--border);padding:24px; }
    .detail-field { margin-bottom:12px; }
    .detail-field label { font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:#64748B;font-weight:700;margin-bottom:2px;display:block; }
    .detail-field .val { font-size:.9rem;font-weight:500;color:#1E293B; }

    @media(max-width:576px){ .stat-item{min-width:100%;} }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark py-2 shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <div class="logo-box"><i class="fa-solid fa-users"></i></div>
      <span class="fw-bold fs-5">Bookmyca <span class="text-white-50 fw-light">Client Master</span></span>
    </a>
    <div class="d-flex gap-2">
      <a href="task-portal.html" class="btn btn-sm btn-outline-light"><i class="fa-solid fa-briefcase me-1"></i>Tasks</a>
      <a href="index.html" class="btn btn-sm btn-outline-light"><i class="fa-solid fa-shield-halved me-1"></i>Hub</a>
      <a href="index.html#attendance" class="btn btn-sm btn-outline-light"><i class="fa-solid fa-fingerprint me-1"></i>Attendance</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">

  <!-- Stats Bar -->
  <div class="stat-bar">
    <div class="stat-item"><span class="stat-num" style="color:var(--navy)" id="s-total">—</span><span class="stat-lbl">Total Clients</span></div>
    <div class="stat-item"><span class="stat-num text-success" id="s-gst">—</span><span class="stat-lbl">With GSTIN</span></div>
    <div class="stat-item"><span class="stat-num text-info" id="s-active">—</span><span class="stat-lbl">Active</span></div>
  </div>

  <!-- Main Card -->
  <div class="card border-0 shadow-sm" style="border-radius:14px;overflow:hidden;">
    <div class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
      <h5 class="mb-0 fw-bold" style="color:var(--navy)"><i class="fa-solid fa-address-book me-2"></i>Client Directory</h5>
      <button class="btn btn-navy px-4 fw-semibold" onclick="openModal()"><i class="fa-solid fa-plus me-2"></i>Add Client</button>
    </div>
    <div class="card-body p-4">
      <div id="loader" class="text-center py-5">
        <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
        <p class="mt-3 text-muted fw-medium">Loading clients…</p>
      </div>
      <div id="tblWrap" style="display:none;" class="table-responsive">
        <table id="cltTbl" class="table table-hover w-100">
          <thead>
            <tr>
              <th>Code</th><th>Client Name</th><th>GSTIN</th><th>State</th>
              <th>Contact</th><th>Phone</th><th>Services</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ADD/EDIT CLIENT MODAL -->
<div class="modal fade" id="clientModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header text-white border-0" style="background:var(--navy);">
        <h5 class="modal-title fw-bold" id="mTitle"><i class="fa-solid fa-user-plus me-2"></i>Add New Client</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-light p-4">
        <form id="cltForm" novalidate>
          <input type="hidden" id="editId">
          <h6 class="text-muted fw-bold small text-uppercase mb-3"><i class="fa-solid fa-building me-1"></i> Basic Information</h6>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-semibold small text-muted">Client Name (Legal) *</label>
              <input type="text" class="form-control" id="f-name" placeholder="e.g. Reliance Industries Ltd" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold small text-muted">Trade Name / Brand</label>
              <input type="text" class="form-control" id="f-trade" placeholder="e.g. Jio">
            </div>
          </div>

          <h6 class="text-muted fw-bold small text-uppercase mb-3"><i class="fa-solid fa-file-invoice me-1"></i> Tax Information</h6>
          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <label class="form-label fw-semibold small text-muted">GSTIN</label>
              <input type="text" class="form-control text-uppercase" id="f-gstin" placeholder="e.g. 08XXXXX0000X1ZX" maxlength="15">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small text-muted">PAN</label>
              <input type="text" class="form-control text-uppercase" id="f-pan" placeholder="e.g. ABCDE1234F" maxlength="10">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small text-muted">State *</label>
              <select class="form-select" id="f-state"></select>
            </div>
          </div>

          <h6 class="text-muted fw-bold small text-uppercase mb-3"><i class="fa-solid fa-location-dot me-1"></i> Address</h6>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-semibold small text-muted">Full Address</label>
              <input type="text" class="form-control" id="f-addr" placeholder="Street, Colony, Landmark">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small text-muted">City</label>
              <input type="text" class="form-control" id="f-city" placeholder="e.g. Jaipur">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small text-muted">Pincode</label>
              <input type="text" class="form-control" id="f-pin" placeholder="e.g. 302001" maxlength="6">
            </div>
          </div>

          <h6 class="text-muted fw-bold small text-uppercase mb-3"><i class="fa-solid fa-phone me-1"></i> Contact</h6>
          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <label class="form-label fw-semibold small text-muted">Contact Person</label>
              <input type="text" class="form-control" id="f-contact" placeholder="e.g. CA Rahul Sharma">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small text-muted">Phone</label>
              <input type="tel" class="form-control" id="f-phone" placeholder="e.g. 9876543210">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small text-muted">Email</label>
              <input type="email" class="form-control" id="f-email" placeholder="e.g. client@company.com">
            </div>
          </div>

          <h6 class="text-muted fw-bold small text-uppercase mb-3"><i class="fa-solid fa-tags me-1"></i> Preferences</h6>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold small text-muted">Service Categories</label>
              <div class="d-flex flex-wrap gap-2" id="svcCheckboxes">
                <!-- dynamically filled -->
              </div>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small text-muted">Payment Terms</label>
              <select class="form-select" id="f-terms">
                <option>Net 15</option><option selected>Net 30</option><option>Net 45</option><option>Net 60</option><option>Immediate</option><option>Custom</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small text-muted">Notes</label>
              <input type="text" class="form-control" id="f-notes" placeholder="Internal notes…">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer bg-white border-0">
        <button class="btn btn-light shadow-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-navy px-4 fw-semibold" id="saveBtn" onclick="saveClient()">
          <i class="fa-solid fa-floppy-disk me-2"></i>Save Client
        </button>
      </div>
    </div>
  </div>
</div>

<!-- VIEW CLIENT MODAL -->
<div class="modal fade" id="viewModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content border-0 shadow-lg" style="border-radius:16px;">
      <div class="modal-header text-white border-0" style="background:var(--navy);">
        <h5 class="modal-title fw-bold" id="viewTitle">Client Profile</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4" id="viewBody">
        <!-- rendered dynamically -->
      </div>
      <div class="modal-footer bg-white border-0">
        <button class="btn btn-light" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-navy" id="btnEditFromView">
          <i class="fa-solid fa-pen me-1"></i>Edit Client
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
const API = '';
let token = '', allClients = [], statesList = [];
const SERVICES = ['GST','ITR','Audit','Subsidy','Accounting','Trademark','Other'];

window.addEventListener('DOMContentLoaded', async () => {
  token = localStorage.getItem('sa_token');
  if (!token) { window.location.href='index.html'; return; }

  // Build service checkboxes
  const box = document.getElementById('svcCheckboxes');
  SERVICES.forEach(s => {
    box.innerHTML += `<div class="form-check"><input class="form-check-input svc-cb" type="checkbox" value="${s}" id="cb-${s}"><label class="form-check-label small" for="cb-${s}">${s}</label></div>`;
  });

  await loadStates();
  await loadClients();
});

async function loadStates() {
  try {
    const r = await fetch(`${API}/api/meta/states`);
    statesList = await r.json();
    const sel = document.getElementById('f-state');
    sel.innerHTML = statesList.map(s => `<option value="${s.code}" ${s.code==='08'?'selected':''}>${s.code} — ${s.name}</option>`).join('');
  } catch(e) { console.error(e); }
}

async function loadClients() {
  $('#loader').show(); $('#tblWrap').hide();
  try {
    const r = await fetch(`${API}/api/clients`,{headers:{Authorization:'Bearer '+token}});
    const data = await r.json();
    allClients = data.clients || [];
    renderStats(allClients);
    renderTable(allClients);
  } catch(e) { Swal.fire('Error','Could not load clients','error'); }
}

function renderStats(clients) {
  const total = clients.length;
  const gst = clients.filter(c => c.gstin && c.gstin.length >= 15).length;
  const active = clients.filter(c => c.isActive).length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-gst').textContent = gst;
  document.getElementById('s-active').textContent = active;
}

function renderTable(clients) {
  if ($.fn.DataTable.isDataTable('#cltTbl')) $('#cltTbl').DataTable().destroy();
  const body = $('#tblBody').empty();
  clients.forEach(c => {
    const svcs = (c.serviceCategories||[]).map(s => `<span class="svc-tag">${s}</span>`).join('');
    body.append(`<tr>
      <td class="fw-semibold text-muted small">${c.clientCode||'—'}</td>
      <td>
        <div class="fw-semibold">${c.clientName}</div>
        <div class="text-muted" style="font-size:.75rem">${c.tradeName||''}</div>
      </td>
      <td class="small">${c.gstin||'<span class="text-muted">—</span>'}</td>
      <td class="small">${c.stateName||c.stateCode||'—'}</td>
      <td class="small">${c.contactPerson||'—'}</td>
      <td class="small">${c.phone||'—'}</td>
      <td>${svcs||'<span class="text-muted small">—</span>'}</td>
      <td>
        <button class="btn btn-sm btn-out-navy me-1" onclick="viewClient('${c._id}')"><i class="fa-solid fa-eye"></i></button>
        <button class="btn btn-sm btn-out-navy" onclick="editClient('${c._id}')"><i class="fa-solid fa-pen"></i></button>
      </td>
    </tr>`);
  });
  $('#cltTbl').DataTable({ pageLength:15, order:[[0,'desc']], language:{ search:'', searchPlaceholder:'🔍 Search clients…', emptyTable:'No clients yet. Click "Add Client" to begin.' } });
  $('#loader').hide(); $('#tblWrap').fadeIn(300);
}

function openModal() {
  document.getElementById('cltForm').reset();
  document.getElementById('editId').value = '';
  document.getElementById('mTitle').innerHTML = '<i class="fa-solid fa-user-plus me-2"></i>Add New Client';
  document.querySelectorAll('.svc-cb').forEach(cb => cb.checked = false);
  document.getElementById('f-state').value = '08';
  new bootstrap.Modal(document.getElementById('clientModal')).show();
}

function editClient(id) {
  const c = allClients.find(x => x._id === id);
  if (!c) return;
  document.getElementById('editId').value       = c._id;
  document.getElementById('mTitle').innerHTML   = '<i class="fa-solid fa-pen me-2"></i>Edit — ' + c.clientCode;
  document.getElementById('f-name').value       = c.clientName;
  document.getElementById('f-trade').value      = c.tradeName || '';
  document.getElementById('f-gstin').value      = c.gstin || '';
  document.getElementById('f-pan').value        = c.pan || '';
  document.getElementById('f-state').value      = c.stateCode || '08';
  document.getElementById('f-addr').value       = c.address || '';
  document.getElementById('f-city').value       = c.city || '';
  document.getElementById('f-pin').value        = c.pincode || '';
  document.getElementById('f-contact').value    = c.contactPerson || '';
  document.getElementById('f-phone').value      = c.phone || '';
  document.getElementById('f-email').value      = c.email || '';
  document.getElementById('f-terms').value      = c.paymentTerms || 'Net 30';
  document.getElementById('f-notes').value      = c.notes || '';
  // Check service checkboxes
  document.querySelectorAll('.svc-cb').forEach(cb => {
    cb.checked = (c.serviceCategories||[]).includes(cb.value);
  });
  // Close view modal if open
  const vm = bootstrap.Modal.getInstance(document.getElementById('viewModal'));
  if (vm) vm.hide();
  new bootstrap.Modal(document.getElementById('clientModal')).show();
}

async function saveClient() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { Swal.fire('Required','Client name is mandatory.','warning'); return; }

  const btn = document.getElementById('saveBtn');
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Saving…'; btn.disabled = true;

  const selState = document.getElementById('f-state');
  const stateOpt = selState.selectedOptions[0];
  const svcs = [];
  document.querySelectorAll('.svc-cb:checked').forEach(cb => svcs.push(cb.value));

  const payload = {
    clientName: name,
    tradeName: document.getElementById('f-trade').value,
    gstin: document.getElementById('f-gstin').value.toUpperCase(),
    pan: document.getElementById('f-pan').value.toUpperCase(),
    stateCode: selState.value,
    stateName: stateOpt ? stateOpt.textContent.replace(/^\d+\s*—\s*/, '') : '',
    address: document.getElementById('f-addr').value,
    city: document.getElementById('f-city').value,
    pincode: document.getElementById('f-pin').value,
    contactPerson: document.getElementById('f-contact').value,
    phone: document.getElementById('f-phone').value,
    email: document.getElementById('f-email').value,
    serviceCategories: svcs,
    paymentTerms: document.getElementById('f-terms').value,
    notes: document.getElementById('f-notes').value
  };

  const id = document.getElementById('editId').value;
  const url = id ? `${API}/api/clients/${id}` : `${API}/api/clients`;
  const method = id ? 'PUT' : 'POST';

  try {
    const r = await fetch(url, { method, headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token }, body:JSON.stringify(payload) });
    const data = await r.json();
    bootstrap.Modal.getInstance(document.getElementById('clientModal')).hide();
    if (data.success) {
      Swal.fire({ title:'Saved!', text:data.message, icon:'success', confirmButtonColor:'#0F172A' });
      loadClients();
    } else {
      Swal.fire('Failed', data.error||'Could not save client.','error');
    }
  } catch(e) {
    Swal.fire('Error','Server unreachable.','error');
  } finally {
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk me-2"></i>Save Client'; btn.disabled = false;
  }
}

function viewClient(id) {
  const c = allClients.find(x => x._id === id);
  if (!c) return;
  const svcs = (c.serviceCategories||[]).map(s => `<span class="svc-tag">${s}</span>`).join('') || '<span class="text-muted">None</span>';

  document.getElementById('viewTitle').textContent = c.clientName;
  document.getElementById('viewBody').innerHTML = `
    <div class="row g-4">
      <div class="col-md-6">
        <div class="detail-field"><label>Client Code</label><div class="val fw-bold" style="color:var(--navy)">${c.clientCode||'—'}</div></div>
        <div class="detail-field"><label>Legal Name</label><div class="val">${c.clientName}</div></div>
        <div class="detail-field"><label>Trade Name</label><div class="val">${c.tradeName||'—'}</div></div>
        <div class="detail-field"><label>GSTIN</label><div class="val">${c.gstin||'Not Registered'}</div></div>
        <div class="detail-field"><label>PAN</label><div class="val">${c.pan||'—'}</div></div>
        <div class="detail-field"><label>State</label><div class="val">${c.stateName||'—'} (${c.stateCode})</div></div>
      </div>
      <div class="col-md-6">
        <div class="detail-field"><label>Address</label><div class="val">${c.address||'—'}, ${c.city||''} ${c.pincode||''}</div></div>
        <div class="detail-field"><label>Contact Person</label><div class="val">${c.contactPerson||'—'}</div></div>
        <div class="detail-field"><label>Phone</label><div class="val">${c.phone||'—'}</div></div>
        <div class="detail-field"><label>Email</label><div class="val">${c.email||'—'}</div></div>
        <div class="detail-field"><label>Payment Terms</label><div class="val">${c.paymentTerms||'Net 30'}</div></div>
        <div class="detail-field"><label>Services</label><div class="val">${svcs}</div></div>
        <div class="detail-field"><label>Notes</label><div class="val">${c.notes||'—'}</div></div>
      </div>
    </div>
  `;
  document.getElementById('btnEditFromView').onclick = () => editClient(id);
  new bootstrap.Modal(document.getElementById('viewModal')).show();
}
</script>
</body>
</html>
